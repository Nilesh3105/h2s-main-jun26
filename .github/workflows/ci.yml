name: CI

# Lint + type + test + a11y on both stacks. The backend runs with NO API key,
# so this also proves the deterministic / fallback path is fully green keyless.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff · black · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Type check (mypy, strict)
        run: uv run mypy app tests

      - name: Test (pytest)
        run: uv run pytest

  frontend:
    name: Frontend (eslint+a11y · prettier · tsc · vitest · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean)
        run: npm ci

      - name: Lint (eslint + jsx-a11y)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Test (vitest + jest-axe)
        run: npm test

      - name: Build
        run: npm run build
